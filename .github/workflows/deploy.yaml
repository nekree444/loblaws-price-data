name: Deploy to Cloud Run

on:
  schedule:
    # hourly but below logic makes it 42 hours
    - cron: '0 * * * *'

jobs:
  schedule_gate:
    name: Schedule gate
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.gate.outputs.should_run }}
    steps:
    - name: Decide whether this run should execute
      id: gate
      run: |
        set -euo pipefail

        if [ "${{ github.event_name }}" != "schedule" ]; then
          echo "should_run=true" >> "$GITHUB_OUTPUT"
          echo "Non-schedule event (${{ github.event_name }}) => run"
          exit 0
        fi

        # Anchor: Thu 2026-03-26 09:00:00 UTC (5:00 AM Eastern during DST)
        anchor_hour=$(( $(date -u -d '2026-03-26 09:00:00' +%s) / 3600 ))
        now_hour=$(( $(date -u +%s) / 3600 ))
        delta_hours=$(( now_hour - anchor_hour ))

        if (( delta_hours >= 0 )) && (( delta_hours % 42 == 0 )); then
          echo "should_run=true" >> "$GITHUB_OUTPUT"
          echo "Schedule gate passed at delta_hours=$delta_hours"
        else
          echo "should_run=false" >> "$GITHUB_OUTPUT"
          echo "Schedule gate skipped at delta_hours=$delta_hours"
        fi

  build_image:
    name: Build shared image
    needs: schedule_gate
    if: needs.schedule_gate.outputs.should_run == 'true'
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Authenticate gcloud CLI
      uses: google-github-actions/auth@v2
      with:
        credentials_json: ${{ secrets.GCP_SA_KEY }}

    - name: Set up Google Cloud SDK
      uses: google-github-actions/setup-gcloud@v1
      with:
        project_id: ${{ secrets.GCP_PROJECT_ID }}

    - name: Build image once with Docker
      run: |
        set -euo pipefail
        IMAGE="gcr.io/${{ secrets.GCP_PROJECT_ID }}/grocery-scrapers:${{ github.sha }}"
        BUILD_ID=$(gcloud builds submit --tag "$IMAGE" . --async --format='value(id)')
        echo "Submitted build: $BUILD_ID"

        while true; do
          STATUS=$(gcloud builds describe "$BUILD_ID" --format='value(status)')
          echo "Build status: $STATUS"

          if [ "$STATUS" = "SUCCESS" ]; then
            break
          fi

          if [ "$STATUS" = "FAILURE" ] || [ "$STATUS" = "INTERNAL_ERROR" ] || [ "$STATUS" = "TIMEOUT" ] || [ "$STATUS" = "CANCELLED" ] || [ "$STATUS" = "EXPIRED" ]; then
            echo "Cloud Build failed with status: $STATUS"
            gcloud builds describe "$BUILD_ID"
            exit 1
          fi

          sleep 10
        done
        echo "Built image: $IMAGE"

  deploy-loblaws:
    name: Loblaws - ${{ matrix.banner }}
    needs: [schedule_gate, build_image]
    if: needs.schedule_gate.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 16
      matrix:
        banner:
          - extrafoods
          - fortinos
          - independent
          - independentcitymarket
          - loblaw
          - nofrills
          - provigo
          - rapid
          - superstore
          - valumart
          - wholesaleclub
          - zehrs
          - maxi
          - dominion
          - rass

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    # Authenticate gcloud CLI
    - name: Authenticate gcloud CLI
      uses: google-github-actions/auth@v2
      with:
        credentials_json: ${{ secrets.GCP_SA_KEY }}

    # Set up Google Cloud SDK
    - name: Set up Google Cloud SDK
      uses: google-github-actions/setup-gcloud@v1
      with:
        project_id: ${{ secrets.GCP_PROJECT_ID }}

    # Deploy to Cloud Run
    - name: Deploy Loblaws Cloud Run Job
      run: |
        IMAGE="gcr.io/${{ secrets.GCP_PROJECT_ID }}/grocery-scrapers:${{ github.sha }}"
        gcloud run jobs deploy scraper-loblaws-${{ matrix.banner }} \
          --image "$IMAGE" \
          --region northamerica-northeast2 \
          --project ${{ secrets.GCP_PROJECT_ID }} \
          --max-retries 10 \
          --task-timeout 180000s \
          --command python3 \
          --args loblaws.py \
          --set-env-vars NEKREE_API_KEY=${{ secrets.NEKREE_API_KEY }},NEKREE_API_UPLOAD=${{ secrets.NEKREE_API_UPLOAD }},NEKREE_API_FILES=${{ secrets.NEKREE_API_FILES }},LOBLAWS_BANNER=${{ matrix.banner }}

    - name: Execute Loblaws Cloud Run Job
      run: |
        gcloud run jobs execute scraper-loblaws-${{ matrix.banner }} \
          --region northamerica-northeast2 \
          --project ${{ secrets.GCP_PROJECT_ID }} \
          --wait

  deploy-empire:
    name: Empire
    needs: [schedule_gate, build_image]
    if: needs.schedule_gate.outputs.should_run == 'true'
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Authenticate gcloud CLI
      uses: google-github-actions/auth@v2
      with:
        credentials_json: ${{ secrets.GCP_SA_KEY }}

    - name: Set up Google Cloud SDK
      uses: google-github-actions/setup-gcloud@v1
      with:
        project_id: ${{ secrets.GCP_PROJECT_ID }}

    - name: Deploy Empire Cloud Run Job
      run: |
        IMAGE="gcr.io/${{ secrets.GCP_PROJECT_ID }}/grocery-scrapers:${{ github.sha }}"
        gcloud run jobs deploy scraper-empire \
          --image "$IMAGE" \
          --region northamerica-northeast2 \
          --project ${{ secrets.GCP_PROJECT_ID }} \
          --max-retries 10 \
          --task-timeout 180000s \
          --command python3 \
          --args empire.py \
          --set-env-vars NEKREE_API_KEY=${{ secrets.NEKREE_API_KEY }},NEKREE_API_UPLOAD=${{ secrets.NEKREE_API_UPLOAD }},NEKREE_API_FILES=${{ secrets.NEKREE_API_FILES }}

    - name: Execute Empire Cloud Run Job
      run: |
        gcloud run jobs execute scraper-empire \
          --region northamerica-northeast2 \
          --project ${{ secrets.GCP_PROJECT_ID }} \
          --wait